name: Deploy PWA to Cloudflare Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: cloudflare-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    name: Build and deploy VRT.Resume.Pwa
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          cache: true
          cache-dependency-path: |
            **/*.csproj
            Directory.Packages.props

      - name: Install WASM workload
        run: dotnet workload install wasm-tools

      - name: Publish Blazor WASM PWA
        run: dotnet publish VRT.Resume.Pwa/VRT.Resume.Pwa.csproj -c Release -o ./deploy/pwa

      - name: Verify publish output
        run: test -f ./deploy/pwa/wwwroot/index.html

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4'
          command: pages deploy ./deploy/pwa/wwwroot --project-name=vrt-resume-pwa
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}